# https://taskfile.dev

version: '3'

vars:
  FILE: interfaces.cog
  DEBUG: false
  REPLACE_LOCAL_COG: true

tasks:
  vet:
    cmds:
    - GOEXPERIMENT=arenas rtk go vet ./...
    silent: false

  test:
    cmds:
    - GOEXPERIMENT=arenas rtk go test -timeout=10s ./...
    silent: false

  compile:
    cmds:
    - GOEXPERIMENT=arenas rtk go run cmd/main.go -file={{.FILE}} -debug={{.DEBUG}} -write=false
    silent: true

  transpile:
    cmds:
    - rm -rf tmp/
    - GOEXPERIMENT=arenas rtk go run cmd/main.go -file={{.FILE}} -debug=false -write=true -replace-local-cog={{.REPLACE_LOCAL_COG}}
    silent: true

  run:
    cmds:
    - task: transpile
      vars:
        FILE: '{{.FILE}}'
        REPLACE_LOCAL_COG: '{{.REPLACE_LOCAL_COG}}'
    - cd tmp && GOEXPERIMENT=arenas rtk go run . -asan -ldflags="-asan -race -s -w"
    silent: true

  run_script:
    cmds:
    - task: transpile
      vars:
        FILE: '{{.FILE}}'
        REPLACE_LOCAL_COG: '{{.REPLACE_LOCAL_COG}}'
    - cd tmp && GOEXPERIMENT=arenas rtk go run ./cmd/interfaces -asan -ldflags="-asan -race -s -w"
    silent: true

  stats:
    desc: Record lines of code and test coverage to stats.txt
    cmds:
    - |
      commit=$(git rev-parse --short HEAD)
      date=$(date -u +%Y-%m-%dT%H:%M:%SZ)
      loc=$(find . -name '*.go' -not -path './tmp/*' | xargs cat | wc -l | tr -d ' ')
      loc_test=$(find . -name '*_test.go' -not -path './tmp/*' | xargs cat 2>/dev/null | wc -l | tr -d ' ')
      loc_src=$((loc - loc_test))
      cov=$(GOEXPERIMENT=arenas go test . ./builtin/... ./internal/... ./cmd/... -coverprofile=/tmp/cog_cov.out -coverpkg=./... -count=1 2>&1 | grep -oE '[0-9]+\.[0-9]+%' | tail -1)
      total_cov=$(go tool cover -func=/tmp/cog_cov.out 2>/dev/null | grep total | awk '{print $NF}')
      echo "${date} ${commit} src=${loc_src} test=${loc_test} total=${loc} coverage=${total_cov}" >> stats.txt
      echo "Recorded: src=${loc_src} test=${loc_test} total=${loc} coverage=${total_cov}"
    silent: true
