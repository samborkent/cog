# https://taskfile.dev

version: '3'

vars:
  FILE: example.cog
  DEBUG: false

tasks:
  test:
    cmds:
    - GOEXPERIMENT=arenas go test ./...
    silent: false

  compile:
    cmds:
    - GOEXPERIMENT=arenas go run cmd/main.go -file={{.FILE}} -debug={{.DEBUG}} -write=false
    silent: true

  transpile:
    cmds:
    - GOEXPERIMENT=arenas go run cmd/main.go -file={{.FILE}} -debug=false -write=true
    silent: true

  run:
    cmds:
    - task transpile
    - GOEXPERIMENT=arenas go run tmp/{{.FILE | trimSuffix ".cog"}}.go -asan -ldflags="-asan -race -s -w"
    silent: true
